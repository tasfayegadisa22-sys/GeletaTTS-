name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ጊትሃብ የ Gradle 8.4 ስሪትን ብቻ እንዲጠቀም መገደብ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Fix Project Structure and Dependencies
        run: |
          echo "--- የፕሮጀክት ፋይሎችን በማስተካከል ላይ ---"
          
          # 1. አድራሻዎችን ማስተካከል
          mkdir -p app/src/main/
          if [ -f "./app/app/src/main/AndroidManifest.xml" ]; then
            cp "./app/app/src/main/AndroidManifest.xml" "./app/src/main/AndroidManifest.xml"
          fi

          # 2. settings.gradle
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GeletaTTS"
          include ':app'
          EOF

          # 3. build.gradle (Root)
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.1.1' apply false
          }
          EOF

          # 4. app/build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.geleta.tts'
              compileSdk 34
              defaultConfig {
                  applicationId "com.geleta.tts"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.activity:activity:1.8.0'
          }
          EOF

          # 5. gradle.properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build APK
        run: |
          # እዚህ ጋር 'gradle' የሚለው ትዕዛዝ በደረጃ 8.4 መሰረት ይሰራል
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: "app/build/outputs/apk/debug/*.apk"
