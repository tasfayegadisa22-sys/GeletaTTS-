name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Advanced Organizer and Crash Protector
        run: |
          echo "--- ፋይል ማደራጀት እና ኮድ ማዘጋጀት ተጀምሯል ---"
          
          rm -rf app
          mkdir -p app/src/main/java/com/redzoc/ramees/tts/espeak
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/espeak-ng-data
          mkdir -p app/src/main/jniLibs

          # ዚፖችን መክፈት
          find . -name "*.zip" -not -path "./app/*" | while read zipfile; do
            unzip -o "$zipfile" -d temp_extracted/
          done

          # የሊብ (.so) ፋይሎችን ማደራጀት
          find . -name "*.so" -not -path "./app/*" | while read sofile; do
            abi=$(basename $(dirname "$sofile"))
            if [[ "$abi" != "armeabi-v7a" && "$abi" != "arm64-v8a" && "$abi" != "x86" && "$abi" != "x86_64" && "$abi" != "armeabi" && "$abi" != "mips" ]]; then
              abi="armeabi-v7a"
            fi
            mkdir -p "app/src/main/jniLibs/$abi"
            cp "$sofile" "app/src/main/jniLibs/$abi/"
          done

          # የዳታ ፋይሎችን ወደ assets መላክ
          find . -type f \( -name "phon*" -o -name "*_dict" -o -name "config" -o -name "*.dat" \) -not -path "./app/*" | while read assetfile; do
            cp "$assetfile" app/src/main/assets/espeak-ng-data/
          done

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources><string name="app_name">GeletaTTS Pro</string></resources>
          EOF

          cat <<EOF > app/src/main/res/values/styles.xml
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"></style></resources>
          EOF

          # የተሻሻለው የጃቫ ሞተር ኮድ (Crash Protector የተጨመረበት)
          cat <<EOF > app/src/main/java/com/redzoc/ramees/tts/espeak/SpeechSynthesis.java
          package com.redzoc.ramees.tts.espeak;
          import android.util.Log;
          public class SpeechSynthesis {
              static { 
                  try { System.loadLibrary("ttsespeak"); } 
                  catch (Throwable e) { Log.e("GeletaTTS", "Library Load Error", e); }
              }
              public static native int nativeCreate();
              public static native int nativeSetLanguage(String lang, String country, String variant);
              public static native int nativeSynthesize(String text, String filename);
              public static native void nativeStop();
          }
          EOF

          # ዳታውን ወደ ስልክ ሜሞሪ አውጪው ኮድ (Data Extractor)
          cat <<EOF > app/src/main/java/com/redzoc/ramees/tts/espeak/GeletaTtsService.java
          package com.redzoc.ramees.tts.espeak;
          import android.speech.tts.*;
          import java.io.*;
          import android.util.Log;

          public class GeletaTtsService extends TextToSpeechService {
              @Override public void onCreate() { 
                  super.onCreate(); 
                  try { 
                      copyDataToStorage();
                      SpeechSynthesis.nativeCreate(); 
                  } catch(Throwable e) { Log.e("GeletaTTS", "Engine Start Error", e); } 
              }

              private void copyDataToStorage() {
                  String destPath = getFilesDir().getAbsolutePath() + "/espeak-ng-data";
                  File dir = new File(destPath);
                  if (!dir.exists()) {
                      dir.mkdirs();
                      copyAssetFolder("espeak-ng-data", destPath);
                  }
              }

              private void copyAssetFolder(String srcPath, String destPath) {
                  try {
                      String[] files = getAssets().list(srcPath);
                      if (files != null && files.length == 0) {
                          InputStream in = getAssets().open(srcPath);
                          OutputStream out = new FileOutputStream(destPath);
                          byte[] buffer = new byte[1024]; int read;
                          while ((read = in.read(buffer)) != -1) out.write(buffer, 0, read);
                          in.close(); out.close();
                      } else if (files != null) {
                          new File(destPath).mkdirs();
                          for (String file : files) copyAssetFolder(srcPath + "/" + file, destPath + "/" + file);
                      }
                  } catch (Exception e) { Log.e("GeletaTTS", "File Copy Error", e); }
              }

              @Override protected int onIsLanguageAvailable(String l, String c, String v) { return TextToSpeech.LANG_AVAILABLE; }
              @Override protected String[] onGetLanguage() { return new String[]{"amh", "ETH", ""}; }
              @Override protected int onLoadLanguage(String l, String c, String v) { 
                  try { return SpeechSynthesis.nativeSetLanguage(l, c, v); } catch(Throwable t) { return TextToSpeech.LANG_NOT_SUPPORTED; }
              }
              @Override protected void onStop() { try { SpeechSynthesis.nativeStop(); } catch(Throwable t){} }
              @Override protected void onSynthesizeText(SynthesisRequest request, SynthesisCallback callback) { 
                  try {
                      callback.start(16000, android.media.AudioFormat.ENCODING_PCM_16BIT, 1);
                      SpeechSynthesis.nativeSynthesize(request.getCharSequenceText().toString(), null);
                      callback.done(); 
                  } catch(Throwable t) { callback.error(); }
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="@string/app_name" android:theme="@style/AppTheme">
                  <service android:name=".GeletaTtsService" android:label="Geleta Engine" android:exported="true" android:permission="android.permission.BIND_TTS_SERVICE">
                      <intent-filter priority="1000"><action android:name="android.intent.action.TTS_SERVICE" /><category android:name="android.intent.category.DEFAULT" /></intent-filter>
                      <meta-data android:name="android.speech.tts" android:resource="@xml/tts_engine" />
                  </service>
              </application>
          </manifest>
          EOF
          echo '<?xml version="1.0" encoding="utf-8"?><tts-engine xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/tts_engine.xml

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          include ':app'
          EOF

          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.1.1' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace 'com.redzoc.ramees.tts.espeak'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.redzoc.ramees.tts.espeak"
                  minSdk 21; targetSdk 34; versionCode 2; versionName "1.1"
                  ndk { abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64', 'mips', 'armeabi' }
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-CrashFree-Build
          path: app/build/outputs/apk/debug/*.apk
