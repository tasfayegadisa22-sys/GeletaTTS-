name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Extract and Flatten Zip
        run: |
          # ዚፕ ፋይሉ ያለበትን ትክክለኛ ቦታ መፈለግ
          if [ -f "geleta-tts-data/lang.zip" ]; then
            ZIP_FILE="geleta-tts-data/lang.zip"
          elif [ -f "lang.zip" ]; then
            ZIP_FILE="lang.zip"
          else
            echo "ስህተት: lang.zip ፋይል አልተገኘም!"
            exit 1
          fi

          echo "$ZIP_FILE ተገኝቷል፣ መፍታት እየተጀመረ ነው..."
          unzip -o "$ZIP_FILE" -d temp_lang/
          mkdir -p app/src/main/assets/geleta-tts-data/
          
          # ከዚፑ የወጡ ፋይሎችን ወደ አሴትስ መገልበጥ
          find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
          
          # በ ፎልደሩ ውስጥ የነበሩ ሌሎች ፋይሎችንም (am_dict ወዘተ) መገልበጥ
          if [ -d "geleta-tts-data" ]; then
            find geleta-tts-data/ -type f ! -name "*.zip" -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
          fi

          rm -rf temp_lang/
          echo "ፋይሎች በተሳካ ሁኔታ ተደራጅተዋል።"

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
