name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Locate and Organize Files
        run: |
          echo "--- ፋይሎችን በመፈለግ ላይ ---"
          
          # ፋይሉን ያለምንም የፊደል ልዩነት (Case-insensitive) ፈልግ
          ZIP_PATH=$(find . -iname "lang.zip" | head -n 1)
          
          if [ -n "$ZIP_PATH" ]; then
            echo "ፋይሉ እዚህ ተገኝቷል: $ZIP_PATH"
            unzip -o "$ZIP_PATH" -d temp_lang/
            mkdir -p app/src/main/assets/geleta-tts-data/
            
            # ፋይሎቹን ወደ አሴትስ መገልበጥ
            find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            
            # ሌሎች ተጓዳኝ ፋይሎችን (am_dict, phondata ወዘተ) መፈለግ እና መገልበጥ
            ZIP_DIR=$(dirname "$ZIP_PATH")
            find "$ZIP_DIR" -type f ! -name "*.zip" -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            
            rm -rf temp_lang/
            echo "ዝግጅት ተጠናቋል።"
          else
            echo "--- ስህተት: lang.zip ፋይል በፕሮጀክቱ ውስጥ አልተገኘም! ---"
            echo "ያሉ ፋይሎች ዝርዝር፦"
            find . -maxdepth 3 -not -path '*/.*'
            exit 1
          fi

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
