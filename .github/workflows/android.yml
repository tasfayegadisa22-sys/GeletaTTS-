name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true  # ስህተት የሚፈጥረውን ካሽ ያጠፋል

      - name: Extract Voice Data
        run: |
          if [ -f "lang.zip" ]; then
            unzip -o lang.zip -d temp_lang/
            mkdir -p app/src/main/assets/geleta-tts-data/
            find temp_lang/ -type f -exec cp {} app/src/main/assets/geleta-tts-data/ \;
            echo "ፋይሎች ተገልብጠዋል።"
          else
            echo "ማሳሰቢያ: lang.zip አልተገኘም!"
          fi

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
