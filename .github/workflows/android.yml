name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Fix Hidden Manifest and Files
        run: |
          echo "--- የተደበቁ ፋይሎችን በማስተካከል ላይ ---"
          if [ -f "./app/app/src/main/AndroidManifest.xml" ]; then
            cp "./app/app/src/main/AndroidManifest.xml" "./app/src/main/AndroidManifest.xml"
          fi
          if [ -d "./app/src/main/java/com/geleta/tts/app/src/main/assets/anikaRobot" ]; then
            mkdir -p ./app/src/main/assets/voices/
            mv "./app/src/main/java/com/geleta/tts/app/src/main/assets/anikaRobot" "./app/src/main/assets/voices/" || true
          fi
          if [ -f "./lang.zip" ]; then
            unzip -o "./lang.zip" -d temp_lang/
            mkdir -p app/src/main/assets/geleta-tts-data/
            find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            rm -rf temp_lang/
          fi

      - name: Fix AndroidX and Dependencies
        run: |
          echo "--- የጃቫ ኮድ ጥገኞችን (Dependencies) በማስተካከል ላይ ---"
          
          # AndroidX መብራቱን ማረጋገጥ
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # አስፈላጊዎቹን ላይብረሪዎች ወደ build.gradle መጨመር
          if ! grep -q "androidx.appcompat:appcompat" app/build.gradle; then
            echo "" >> app/build.gradle
            echo "dependencies {" >> app/build.gradle
            echo "    implementation 'androidx.appcompat:appcompat:1.6.1'" >> app/build.gradle
            echo "    implementation 'com.google.android.material:material:1.10.0'" >> app/build.gradle
            echo "}" >> app/build.gradle
          fi

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: "**/build/outputs/apk/debug/*.apk"
