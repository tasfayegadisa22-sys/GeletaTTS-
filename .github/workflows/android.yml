name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: Fix Nested Folder Structure
      run: |
        if [ -d "app/app" ]; then
          echo "Nested app folder found. Fixing..."
          cp -r app/app/* app/
          rm -rf app/app
        fi

    - name: Move TTS Data Files to Assets
      run: |
        # ፎልደሩን መፍጠር
        mkdir -p app/src/main/assets/geleta-tts-data
        
        # ፋይሎቹን ከዋናው ገጽ ፈልጎ ወደ ፎልደሩ ማዛወር
        mv am_dict app/src/main/assets/geleta-tts-data/ 2>/dev/null || true
        mv phondata app/src/main/assets/geleta-tts-data/ 2>/dev/null || true
        mv phondata-manifest app/src/main/assets/geleta-tts-data/ 2>/dev/null || true
        mv phonindex app/src/main/assets/geleta-tts-data/ 2>/dev/null || true
        mv phontab app/src/main/assets/geleta-tts-data/ 2>/dev/null || true
        
        echo "የ eSpeak NG ዳታ ፋይሎች ወደ ትክክለኛው ቦታ ተዛውረዋል!"

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GeletaTTS-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
