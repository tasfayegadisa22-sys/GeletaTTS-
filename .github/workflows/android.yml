name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4  # እዚህ ጋር ስሪቱን በግልጽ ወስነነዋል

      - name: Organize Files
        run: |
          # ፋይሎቹን ማደራጀት
          ZIP_PATH=$(find . -iname "lang.zip" | head -n 1)
          if [ -n "$ZIP_PATH" ]; then
            unzip -o "$ZIP_PATH" -d temp_lang/
            mkdir -p app/src/main/assets/geleta-tts-data/
            find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            rm -rf temp_lang/
          fi

      - name: Build APK
        run: |
          # gradlew ፋይል ከሌለ አዲስ በ 8.4 ስሪት እንዲሰራ ማድረግ
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace
