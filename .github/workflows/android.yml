name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Inject Professional TTS Logic and Logger
        run: |
          echo "--- ኮምቦቦክስ፣ ሎገር እና የTTS ሞተርን በማዋሃድ ላይ ---"
          
          rm -rf app
          mkdir -p app/src/main/java/com/geleta/tts
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/geleta-tts-data

          # 1. የተሻሻለ UI (ከSpinner እና Logger ጋር)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#F5F5F5">
              <LinearLayout 
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="20dp">
                  
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="GeletaTTS Dashboard"
                      android:textSize="22sp"
                      android:textStyle="bold"
                      android:textColor="#333333"
                      android:layout_marginBottom="25dp"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ቋንቋ ይምረጡ (Select Language):"
                      android:layout_marginBottom="8dp"/>

                  <Spinner
                      android:id="@+id/langSpinner"
                      android:layout_width="match_parent"
                      android:layout_height="50dp"
                      android:background="@android:drawable/btn_dropdown"
                      android:layout_marginBottom="25dp"/>

                  <Button
                      android:id="@+id/testButton"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="ሞተሩን ፈትሽ (Test Engine)"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="የአሰራር ሂደት (System Logs):"
                      android:textStyle="bold"
                      android:layout_marginTop="30dp"
                      android:layout_marginBottom="10dp"/>

                  <TextView
                      android:id="@+id/logView"
                      android:layout_width="match_parent"
                      android:layout_height="200dp"
                      android:background="#000000"
                      android:textColor="#00FF00"
                      android:padding="10dp"
                      android:textSize="12sp"
                      android:fontFamily="monospace"
                      android:text="[System] GeletaTTS Logger Started...\n"
                      android:scrollbars="vertical"/>
              </LinearLayout>
          </ScrollView>
          EOF

          # 2. MainActivity.java (ከSpinner እና Logger ጋር)
          cat <<EOF > app/src/main/java/com/geleta/tts/MainActivity.java
          package com.geleta.tts;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.widget.*;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private TextView logView;
              private void addLog(String msg) {
                  logView.append("\n> " + msg);
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  logView = findViewById(R.id.logView);
                  Spinner spinner = findViewById(R.id.langSpinner);
                  Button testButton = findViewById(R.id.testButton);

                  List<String> languages = Arrays.asList("አማርኛ (Amharic)", "Afaan Oromoo (Oromo)", "English");
                  ArrayAdapter<String> adapter = new ArrayAdapter<>(this, android.R.layout.simple_spinner_item, languages);
                  adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                  spinner.setAdapter(adapter);

                  testButton.setOnClickListener(v -> {
                      String selected = spinner.getSelectedItem().toString();
                      addLog("ሙከራ በ " + selected + " በመካሄድ ላይ...");
                      addLog("የድምፅ ዳታ በመፈለግ ላይ...");
                      addLog("ስህተት፡ የድምፅ ዳታ አልተገኘም (Simulation Mode)");
                  });
              }
          }
          EOF

          # 3. GeletaTtsService.java (የሲስተም ምዝገባ ማስተካከያ)
          cat <<EOF > app/src/main/java/com/geleta/tts/GeletaTtsService.java
          package com.geleta.tts;
          import android.speech.tts.TextToSpeech;
          import android.speech.tts.TextToSpeechService;
          import android.speech.tts.SynthesisRequest;
          import android.speech.tts.SynthesisCallback;

          public class GeletaTtsService extends TextToSpeechService {
              @Override
              protected int onIsLanguageAvailable(String lang, String country, String variant) {
                  return TextToSpeech.LANG_AVAILABLE;
              }
              @Override
              protected String[] onGetLanguage() { return new String[]{"amh", "ETH", ""}; }
              @Override
              protected int onLoadLanguage(String lang, String country, String variant) { return 1; }
              @Override
              protected void onStop() {}
              @Override
              protected void onSynthesizeText(SynthesisRequest request, SynthesisCallback callback) {
                  callback.start(16000, 2, 1);
                  callback.done();
              }
          }
          EOF

          # 4. Manifest (Service Fix)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="GeletaTTS" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".GeletaTtsService" 
                      android:label="Geleta Amharic &amp; Oromo TTS" 
                      android:exported="true" 
                      android:permission="android.permission.BIND_TTS_SERVICE">
                      <intent-filter priority="1000">
                          <action android:name="android.intent.action.TTS_SERVICE" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                      <meta-data android:name="android.speech.tts" android:resource="@xml/tts_engine" />
                  </service>
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><tts-engine xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/tts_engine.xml
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'GeletaTTS'" >> settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.geleta.tts'
              compileSdk 34
              defaultConfig { applicationId "com.geleta.tts"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          echo "android.useAndroidX=true" > gradle.properties

      - name: Build APK
        run: |
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: app/build/outputs/apk/debug/*.apk
