name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Inject System Data Checker and TTS Logic
        run: |
          echo "--- የአንድሮይድን ዳታ ፍተሻ (CheckVoiceData) ጥያቄ የሚመልስ ኮድ መጨመር ---"
          
          rm -rf app
          mkdir -p app/src/main/java/com/geleta/tts
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/geleta-tts-data

          # 1. የአንድሮይድን ጥያቄ የሚመልስ አዲስ ክፍል (CheckVoiceData.java)
          cat <<EOF > app/src/main/java/com/geleta/tts/CheckVoiceData.java
          package com.geleta.tts;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import java.util.ArrayList;

          public class CheckVoiceData extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // ለአንድሮይድ "እነዚህ ቋንቋዎች አሉኝ" ብለን እንነግረዋለን
                  ArrayList<String> availableVoices = new ArrayList<>();
                  availableVoices.add("amh-ETH");
                  availableVoices.add("orm-ETH");
                  availableVoices.add("eng-USA");

                  Intent returnData = new Intent();
                  returnData.putStringArrayListExtra(TextToSpeech.Engine.EXTRA_AVAILABLE_VOICES, availableVoices);
                  
                  // ዳታው አለ ብለን ሪፖርት እናደርጋለን (PASS)
                  setResult(TextToSpeech.Engine.CHECK_VOICE_DATA_PASS, returnData);
                  finish(); // ወዲያውኑ ይዘጋል (በጀርባ ነው የሚሰራው)
              }
          }
          EOF

          # 2. MainActivity.java (ከLogger ጋር)
          cat <<EOF > app/src/main/java/com/geleta/tts/MainActivity.java
          package com.geleta.tts;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.widget.*;
          import android.content.res.AssetManager;
          import java.io.IOException;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private TextView logView;
              private void addLog(String msg) { runOnUiThread(() -> logView.append("\n> " + msg)); }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  logView = findViewById(R.id.logView);
                  Spinner spinner = findViewById(R.id.langSpinner);
                  Button testButton = findViewById(R.id.testButton);

                  List<String> languages = Arrays.asList("አማርኛ (Amharic)", "Afaan Oromoo (Oromo)", "English");
                  ArrayAdapter<String> adapter = new ArrayAdapter<>(this, android.R.layout.simple_spinner_item, languages);
                  adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                  spinner.setAdapter(adapter);

                  testButton.setOnClickListener(v -> {
                      addLog("የአንድሮይድ ዳታ ማረጋገጫ (CheckVoiceData) በትክክል ተገናኝቷል!");
                      checkVoiceData();
                  });
              }

              private void checkVoiceData() {
                  AssetManager am = getAssets();
                  try {
                      String[] files = am.list("geleta-tts-data");
                      if (files == null || files.length == 0) addLog("⚠️ ስህተት፡ ምንም ፋይል የለም!");
                      else addLog("✅ ስኬት፡ " + files.length + " ፋይሎች አሉ።");
                  } catch (IOException e) { addLog("❌ ስህተት: " + e.getMessage()); }
              }
          }
          EOF

          # የቋንቋ ፋይሎች ካሉ መገልበጥ
          if [ -f "./lang.zip" ]; then
            unzip -o "./lang.zip" -d temp_lang/
            find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            rm -rf temp_lang/
          else
            echo "Dummy" > app/src/main/assets/geleta-tts-data/dummy.dat
          fi

          # 3. UI (Layout)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:padding="20dp">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="GeletaTTS Pro Dashboard" android:textSize="20sp" android:textStyle="bold" android:layout_marginBottom="20dp"/>
              <Spinner android:id="@+id/langSpinner" android:layout_width="match_parent" android:layout_height="50dp" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/testButton" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="የሲስተም ዳታ ፍተሻ"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000" android:layout_marginTop="10dp">
                  <TextView android:id="@+id/logView" android:layout_width="match_parent" android:layout_height="wrap_content" android:textColor="#00FF00" android:padding="10dp" android:fontFamily="monospace" android:text="[System] GeletaTTS Ready..."/>
              </ScrollView>
          </LinearLayout>
          EOF

          # 4. የተስተካከለው Manifest (CheckVoiceData ተጨምሮበታል)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="GeletaTTS" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  
                  <activity android:name=".CheckVoiceData" android:exported="true">
                      <intent-filter>
                          <action android:name="android.speech.tts.engine.CHECK_TTS_DATA" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </activity>

                  <service android:name=".GeletaTtsService" android:label="Geleta Multi-Lang TTS" android:exported="true" android:permission="android.permission.BIND_TTS_SERVICE">
                      <intent-filter priority="1000">
                          <action android:name="android.intent.action.TTS_SERVICE" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                      <meta-data android:name="android.speech.tts" android:resource="@xml/tts_engine" />
                  </service>
                  
              </application>
          </manifest>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><tts-engine xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/tts_engine.xml
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'GeletaTTS'" >> settings.gradle
          
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.geleta.tts'; compileSdk 34; defaultConfig { applicationId "com.geleta.tts"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          echo "android.useAndroidX=true" > gradle.properties

          # 5. GeletaTtsService.java
          cat <<EOF > app/src/main/java/com/geleta/tts/GeletaTtsService.java
          package com.geleta.tts;
          import android.speech.tts.*;
          public class GeletaTtsService extends TextToSpeechService {
              @Override protected int onIsLanguageAvailable(String l, String c, String v) { return TextToSpeech.LANG_AVAILABLE; }
              @Override protected String[] onGetLanguage() { return new String[]{"amh", "ETH", ""}; }
              @Override protected int onLoadLanguage(String l, String c, String v) { return 1; }
              @Override protected void onStop() {}
              @Override protected void onSynthesizeText(SynthesisRequest r, SynthesisCallback c) { c.start(16000, 2, 1); c.done(); }
          }
          EOF

      - name: Build APK
        run: |
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: app/build/outputs/apk/debug/*.apk
