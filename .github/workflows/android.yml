name: List Project Files

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🔎 List All Files
        run: |
          echo "--- የፕሮጀክትህ ፋይሎች ዝርዝር ---"
          find . -not -path '*/\.git/*' -type f | sort
          echo "-------------------------------"
