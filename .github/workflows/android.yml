name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Force Reconstruction of Project
        run: |
          echo "--- ፕሮጀክቱን ከዜሮ በትክክል በመገንባት ላይ ---"
          
          # 1. አሮጌ እና የተዘበራረቁ ፎልደሮችን ማጽዳት
          rm -rf app
          mkdir -p app/src/main/java/com/geleta/tts
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/geleta-tts-data

          # 2. የሚሰራ AndroidManifest.xml መፍጠር
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="GeletaTTS"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".GeletaTtsService"
                      android:label="Geleta TTS Engine"
                      android:exported="true"
                      android:permission="android.permission.BIND_TTS_SERVICE">
                      <intent-filter>
                          <action android:name="android.intent.action.TTS_SERVICE" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                      <meta-data
                          android:name="android.speech.tts"
                          android:resource="@xml/tts_engine" />
                  </service>
              </application>
          </manifest>
          EOF

          # 3. አዲስ እና ንጹህ MainActivity.java መጻፍ (ግጭቶችን ለማስወገድ)
          cat <<EOF > app/src/main/java/com/geleta/tts/MainActivity.java
          package com.geleta.tts;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.widget.TextView;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("GeletaTTS ዝግጁ ነው!");
                  tv.setTextSize(24);
                  setContentView(tv);
              }
          }
          EOF

          # 4. አስፈላጊ የሆኑ የሪሶርስ ፋይሎችን መፍጠር
          echo '<resources><style name="Theme.GeletaTTS" parent="Theme.AppCompat.Light.DarkActionBar" /></resources>' > app/src/main/res/values/themes.xml
          echo '<resources><string name="app_name">GeletaTTS</string></resources>' > app/src/main/res/values/strings.xml
          echo '<?xml version="1.0" encoding="utf-8"?><tts-engine xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/tts_engine.xml

          # 5. የቋንቋ ፋይሎችን መፍታት
          if [ -f "./lang.zip" ]; then
            unzip -o "./lang.zip" -d temp_lang/
            find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            rm -rf temp_lang/
          fi

          # 6. የGradle ማዋቀሪያ ፋይሎችን መፍጠር
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "GeletaTTS"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.1.1' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.geleta.tts'
              compileSdk 34
              defaultConfig {
                  applicationId "com.geleta.tts"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build APK
        run: |
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: "app/build/outputs/apk/debug/*.apk"
