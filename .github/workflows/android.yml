name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Extract and Flatten Zip
        run: |
          if [ -f "lang.zip" ]; then
            echo "ዚፕ ፋይሉ ተገኝቷል፣ መፍታት እየተጀመረ ነው..."
            unzip -o lang.zip -d temp_lang/
            mkdir -p app/src/main/assets/geleta-tts-data/
            
            # ሁሉንም ፋይሎች ከውስጥ ፎልደሮች አውጥቶ ወደ አንድ ቦታ መገልበጥ
            echo "ፋይሎችን እየበረበርኩ ነው..."
            find temp_lang/ -type f -exec cp -v {} app/src/main/assets/geleta-tts-data/ \;
            
            echo "የተገለበጡ ፋይሎች ዝርዝር፦"
            ls app/src/main/assets/geleta-tts-data/
            
            rm lang.zip
            rm -rf temp_lang/
          else
            echo "ስህተት: lang.zip ፋይል በዋናው ገጽ ላይ አልተገኘም!"
            exit 1
          fi

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/src/main/assets/geleta-tts-data/
          git commit -m "Organized voice files" || echo "ምንም የሚቀየር ፋይል የለም"
          git push || echo "Push ማድረግ አልተቻለም"

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
