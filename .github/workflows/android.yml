name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Force Standard Project Structure
        run: |
          echo "--- ፋይሎችን ወደ ትክክለኛ ቦታ በማዛወር ላይ ---"
          
          # 1. ንጹህ መዋቅር መፍጠር
          mkdir -p staging/app/src/main/java
          mkdir -p staging/app/src/main/res
          mkdir -p staging/app/src/main/assets

          # 2. የጃቫ ኮዶችን ፈልጎ ማውጣት (ከየትኛውም ቦታ)
          find . -name "*.java" ! -path "*/staging/*" | while read file; do
            pkg_path=$(grep -m 1 "^package " "$file" | sed 's/package //' | sed 's/;//' | tr '.' '/')
            mkdir -p "staging/app/src/main/java/$pkg_path"
            cp "$file" "staging/app/src/main/java/$pkg_path/"
          done

          # 3. ማኒፌስት እና ሪሶርስ ፋይሎችን መፈለግ
          find . -name "AndroidManifest.xml" ! -path "*/staging/*" -exec cp {} staging/app/src/main/AndroidManifest.xml \; -quit || true
          find . -name "res" -type d ! -path "*/staging/*" -exec cp -r {}/* staging/app/src/main/res/ \; || true
          find . -name "assets" -type d ! -path "*/staging/*" -exec cp -r {}/* staging/app/src/main/assets/ \; || true

          # 4. የድሮ ፋይሎችን አጽድቶ በአዲሱ መተካት
          rm -rf app build.gradle settings.gradle gradle.properties
          mv staging/* .
          rm -rf staging

          # 5. ትክክለኛ የ settings.gradle ፋይል መፍጠር
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "GeletaTTS"
          include ':app'
          EOF

          # 6. ዋናው build.gradle
          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.1.1' apply false }
          EOF

          # 7. የ app/build.gradle ፋይል
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.geleta.tts'
              compileSdk 34
              defaultConfig {
                  applicationId "com.geleta.tts"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

          # 8. gradle.properties
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build APK
        run: |
          chmod +x gradlew || true
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: "app/build/outputs/apk/debug/*.apk"
