name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Add Multi-Language Support
        run: |
          echo "--- የአማርኛ፣ ኦሮምኛ እና እንግሊዘኛ ቋንቋዎችን በመጨመር ላይ ---"
          
          rm -rf app
          mkdir -p app/src/main/java/com/geleta/tts
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/geleta-tts-data

          # 1. የተሻሻለ የቅንጅቶች ገጽ (ከቋንቋ ምርጫ ጋር)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <LinearLayout 
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="20dp">
                  
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="GeletaTTS ቅንጅቶች"
                      android:textSize="24sp"
                      android:textStyle="bold"
                      android:layout_marginBottom="20dp"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ቋንቋ ይምረጡ (Select Language)"
                      android:textStyle="bold"
                      android:layout_marginBottom="10dp"/>

                  <RadioGroup
                      android:id="@+id/langGroup"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginBottom="20dp">
                      <RadioButton android:id="@+id/rbAmh" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="አማርኛ (Amharic)" android:checked="true"/>
                      <RadioButton android:id="@+id/rbOrm" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Afaan Oromoo (Oromo)"/>
                      <RadioButton android:id="@+id/rbEng" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="English"/>
                  </RadioGroup>

                  <View android:layout_width="match_parent" android:layout_height="1dp" android:background="#CCCCCC" android:layout_marginBottom="20dp"/>

                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="የንግግር ፍጥነት (Speech Rate)"/>
                  <SeekBar android:id="@+id/speedSeekBar" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="100" android:progress="50" android:layout_marginBottom="20dp"/>

                  <Button
                      android:id="@+id/testButton"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:text="ድምፁን ሞክር (Test Voice)"/>
              </LinearLayout>
          </ScrollView>
          EOF

          # 2. MainActivity.java (የምርጫ ክትትል)
          cat <<EOF > app/src/main/java/com/geleta/tts/MainActivity.java
          package com.geleta.tts;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import android.widget.Button;
          import android.widget.RadioGroup;
          import android.widget.Toast;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  RadioGroup langGroup = findViewById(R.id.langGroup);
                  Button testButton = findViewById(R.id.testButton);

                  testButton.setOnClickListener(v -> {
                      int selectedId = langGroup.getCheckedRadioButtonId();
                      String lang = "አማርኛ";
                      if (selectedId == R.id.rbOrm) lang = "Afaan Oromoo";
                      else if (selectedId == R.id.rbEng) lang = "English";
                      
                      Toast.makeText(this, lang + " ተመርጧል - ሞተሩ ዝግጁ ነው!", Toast.LENGTH_SHORT).show();
                  });
              }
          }
          EOF

          # 3. GeletaTtsService.java (የ3ቱን ቋንቋዎች ተገኝነት ማረጋገጥ)
          cat <<EOF > app/src/main/java/com/geleta/tts/GeletaTtsService.java
          package com.geleta.tts;
          import android.speech.tts.TextToSpeech;
          import android.speech.tts.TextToSpeechService;
          import android.speech.tts.SynthesisRequest;
          import android.speech.tts.SynthesisCallback;
          import java.util.Locale;

          public class GeletaTtsService extends TextToSpeechService {
              @Override
              protected int onIsLanguageAvailable(String lang, String country, String variant) {
                  if ("amh".equals(lang) || "orm".equals(lang) || "eng".equals(lang) || "am".equals(lang) || "om".equals(lang) || "en".equals(lang)) {
                      return TextToSpeech.LANG_AVAILABLE;
                  }
                  return TextToSpeech.LANG_NOT_SUPPORTED;
              }

              @Override
              protected String[] onGetLanguage() {
                  return new String[]{"amh", "ETH", ""};
              }

              @Override
              protected int onLoadLanguage(String lang, String country, String variant) {
                  return onIsLanguageAvailable(lang, country, variant);
              }

              @Override
              protected void onStop() {}

              @Override
              protected void onSynthesizeText(SynthesisRequest request, SynthesisCallback callback) {
                  callback.start(16000, 2, 1);
                  callback.done();
              }
          }
          EOF

          # 4. Resources
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="GeletaTTS" android:theme="@style/Theme.AppCompat.Light">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".GeletaTtsService" android:exported="true" android:label="Geleta Multi-Lang TTS" android:permission="android.permission.BIND_TTS_SERVICE">
                      <intent-filter priority="100"><action android:name="android.intent.action.TTS_SERVICE" /></intent-filter>
                      <meta-data android:name="android.speech.tts" android:resource="@xml/tts_engine" />
                  </service>
              </application>
          </manifest>
          EOF
          echo '<?xml version="1.0" encoding="utf-8"?><tts-engine xmlns:android="http://schemas.android.com/apk/res/android" />' > app/src/main/res/xml/tts_engine.xml
          echo '<resources><style name="AppTheme" parent="Theme.AppCompat.Light" /></resources>' > app/src/main/res/values/styles.xml

          # 5. Gradle
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'GeletaTTS'" >> settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.geleta.tts'
              compileSdk 34
              defaultConfig { applicationId "com.geleta.tts"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build APK
        run: |
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GeletaTTS-App
          path: app/build/outputs/apk/debug/*.apk
