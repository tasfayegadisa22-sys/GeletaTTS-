- name: Extract Voice Data and Organize
        run: |
          # 1. ዚፕ ፋይሉን መፍታት (Unzip)
          unzip lang.zip -d temp_lang/
          
          # 2. የገለታ ቲቲኤስ ዳታ ፎልደር መፍጠር (ከሌለ)
          mkdir -p app/src/main/assets/geleta-tts-data/
          
          # 3. ፋይሎቹን ከ 'lang' ውስጥ ወደ ዋናው ቦታ መገልበጥ
          # 'find' ትዕዛዝ ሁሉንም ፋይሎች በርብሮ ያገኛል
          find temp_lang/ -type f -exec cp {} app/src/main/assets/geleta-tts-data/ \;
          
          # 4. ትርፍ የሆኑ ፋይሎችን ማጽዳት
          rm lang.zip
          rm -rf temp_lang/

      - name: Commit Organized Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/src/main/assets/geleta-tts-data/
          git commit -m "Organized voice files from zip" || echo "No changes to commit"
          git push
