name: Build GeletaTTS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle 8.4
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.4

    - name: Download Missing Voice Files
      run: |
        # አስፈላጊ ፋይሎችን ከ eSpeak NG ኦፊሴላዊ ገጽ ዳውንሎድ ማድረግ
        # ለአማርኛ
        if [ ! -f "am" ]; then
          curl -L https://raw.githubusercontent.com/espeak-ng/espeak-ng/master/espeak-ng-data/voices/africa/am -o am
        fi
        
        # ለኦሮምኛ
        if [ ! -f "om" ]; then
          curl -L https://raw.githubusercontent.com/espeak-ng/espeak-ng/master/espeak-ng-data/voices/africa/om -o om
        fi

        # ለእንግሊዝኛ
        if [ ! -f "en" ]; then
          curl -L https://raw.githubusercontent.com/espeak-ng/espeak-ng/master/espeak-ng-data/voices/default/en-us -o en
        fi

    - name: Move TTS Data Files to Assets
      run: |
        mkdir -p app/src/main/assets/geleta-tts-data
        
        # ቅጥያ የሌላቸውን ፋይሎች በሙሉ (am, om, phondata, ወዘተ) ማዛወር
        for file in *; do
          if [ -f "$file" ] && [[ "$file" != *.* ]]; then
            mv "$file" app/src/main/assets/geleta-tts-data/ 2>/dev/null || true
          fi
        done
        
        echo "ሁሉም ፋይሎች (ወርደውም ሆነ ተገኝተው) ተዘጋጅተዋል!"

    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GeletaTTS-Debug-APK
        path: "**/build/outputs/apk/debug/*.apk"
